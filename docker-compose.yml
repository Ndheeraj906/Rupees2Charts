services:
  db:
    image: postgres:16-alpine
    container_name: rupees2charts_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ruppes2bar}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ruppes2bar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rupees2charts_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ruppes2bar}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
